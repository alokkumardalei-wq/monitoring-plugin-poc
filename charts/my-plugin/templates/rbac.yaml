apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "my-plugin.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my-plugin.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "my-plugin.fullname" . }}-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my-plugin.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: ["everest.percona.com"]
    resources: ["databaseclusters", "monitoringconfigs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "my-plugin.fullname" . }}-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my-plugin.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "my-plugin.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "my-plugin.fullname" . }}-role
  apiGroup: rbac.authorization.k8s.io
