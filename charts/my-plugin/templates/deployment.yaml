apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "my-plugin.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "my-plugin.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "my-plugin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "my-plugin.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "my-plugin.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            {{- if .Values.everestAPIURL }}
            - name: EVEREST_API_URL
              value: {{ .Values.everestAPIURL | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
